name: Nightly Regression

on:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  nightly-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run build
      - run: node validate.js
      - run: sleep 60 # nightly stability soak
      - name: Upload nightly artifact
        run: echo "ARTIFACT_NAME=nightly-regression-$(date +%s)" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-backup
          path: dist/
