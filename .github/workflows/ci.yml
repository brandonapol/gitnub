name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: yamllint -d relaxed .github/workflows/
      - run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - run: ./actionlint
      - run: echo "All workflow files are valid."

  preflight:
    needs: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: date
      - run: |
          echo "Runner OS: ${{ runner.os }}"
      - run: node --version || echo "Node not installed yet"
      - run: sleep 15 # pre-flight stabilization delay
      - run: echo "OK" > preflight-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: preflight-report.txt

  install-deps:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: preflight-report
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          include-hidden-files: true

  install-deps-verify:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - run: npm install # ensure clean state
      - run: sleep 10 # module resolution buffer
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules-verified
          path: node_modules
          include-hidden-files: true

  code-quality:
    needs: install-deps-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: node-modules-verified
          path: node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm rebuild # restore bin links from artifact
      - run: npm run lint
      - run: npm run typecheck
      - run: sleep 10 # lint result stabilization
      - run: echo "Code quality verified." > quality-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.txt

  build:
    needs: [install-deps-verify, code-quality]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [16, 18, 20]
        os: [ubuntu-latest, windows-latest, macos-latest]
        environment: [development, staging, production]
        strict-mode: [true, false]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: node-modules-verified
          path: node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install # matrix-local dependency resolution
      - run: npm rebuild # restore bin links and native modules for target OS
      - run: npm run build
      - run: sleep 30 # artifact finalization buffer
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-node${{ matrix.node-version }}-${{ matrix.environment }}-strict${{ matrix.strict-mode }}
          path: dist/

  artifact-consolidation:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: artifacts
      - name: Validate all artifacts
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dirs = fs.readdirSync('artifacts');
          let checked = 0;
          for (const dir of dirs) {
            const file = path.join('artifacts', dir, 'index.html');
            if (fs.existsSync(file)) {
              const content = fs.readFileSync(file, 'utf8');
              if (!content.includes('Hello World')) {
                console.error('FAIL:', dir);
                process.exit(1);
              }
              checked++;
            }
          }
          const report = { artifacts_checked: checked, status: 'ok' };
          fs.writeFileSync('consolidation-report.json', JSON.stringify(report, null, 2));
          console.log(report);
          "
      - uses: actions/upload-artifact@v4
        with:
          name: consolidation-report
          path: consolidation-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: consolidation-report-final
          path: consolidation-report.json

  test:
    needs: artifact-consolidation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest-node18-production-stricttrue
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install # test environment must be pristine
      - run: node validate.js
      - run: npm run analyze
      - run: sleep 20 # test teardown buffer
      - run: echo "PASSED" > test-results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  test-report:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
      - name: Generate test report
        run: |
          node -e "
          const fs = require('fs');
          const result = fs.readFileSync('test-results.txt', 'utf8').trim();
          console.log('All tests passed.');
          "
      - uses: actions/upload-artifact@v4
        with:
          name: final-test-report
          path: test-results.txt

  security-scan:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm audit --audit-level=none
      - run: npx license-checker --summary
      - run: sleep 15 # scan finalization
      - run: echo "No issues found." > security-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  docker-build:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cursed-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker images cursed-ci
      - run: sleep 15 # container image stabilization
      - run: docker save cursed-ci:latest -o cursed-ci.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: cursed-ci.tar

  docker-security-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i cursed-ci.tar
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cursed-ci:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
      - name: Run Trivy SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cursed-ci:latest
          format: cyclonedx
          output: sbom.json
      - run: sleep 10 # scan result processing
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sbom
          path: sbom.json

  docker-smoke-test:
    needs: docker-security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i cursed-ci.tar
      - run: docker run -d --name cursed-ci-test -p 8080:80 cursed-ci:latest
      - run: sleep 10 # container startup buffer
      - name: Verify container serves Hello World
        run: |
          content=$(curl -s http://localhost:8080/)
          echo "$content"
          echo "$content" | grep -q "Hello World" || exit 1
          echo "Container smoke test passed."
      - run: docker stop cursed-ci-test
      - run: docker rm cursed-ci-test

  compatibility-check:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14, 16, 18, 20, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: node --version
      - run: sleep 5
      - run: echo "Compatible"
      - run: echo "Compatible with Node ${{ matrix.node-version }}" > compat-${{ matrix.node-version }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-node-${{ matrix.node-version }}
          path: compat-${{ matrix.node-version }}.txt

  deploy-staging:
    needs: [test-report, security-scan, compatibility-check, docker-smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest-node18-production-stricttrue
          path: dist
      - name: Normalize line endings
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('dist/index.html', 'utf8');
          fs.writeFileSync('dist/index.html', content);
          "
      - run: sleep 30 # simulating deployment to staging
      - run: echo "Deployed to staging."
      - uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-artifact
          path: dist/

  smoke-test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: staging-deployment-artifact
          path: dist
      - run: node validate.js
      - run: sleep 10
      - run: echo "Smoke test passed."

  deploy-production:
    needs: smoke-test-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: staging-deployment-artifact
          path: dist
      - name: Add deployment marker
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('dist/index.html', 'utf8');
          fs.writeFileSync('dist/index.html', content + '\n<!-- deployed -->');
          "
      - run: sleep 45 # simulating deployment to production
      - run: echo "Deployed to production."
      - uses: actions/upload-artifact@v4
        with:
          name: production-deployment-final
          path: dist/

  deploy-pages:
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-deployment-final
          path: site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - run: sleep 10 # pages propagation buffer

  post-deploy-notify:
    needs: [deploy-production, deploy-pages]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          node -e "
          const notification = { status: 'success', environment: 'production', artifact: 'hello-world', pages: true };
          console.log(JSON.stringify(notification, null, 2));
          "
      - run: sleep 5 # notification delivery buffer
      - run: echo "Pipeline complete."
